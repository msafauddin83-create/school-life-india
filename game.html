<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>School Life India</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  touch-action:none;
  user-select:none;
}
body{
  background:#101827;
  font-family:Arial,sans-serif;
  overflow:hidden;
  color:white;
}
#game{
  width:100vw;
  height:100vh;
  position:relative;
  overflow:hidden;
  background:linear-gradient(#7dd3fc 0 25%,#86c95a 25% 100%);
}

/* HUD */
#hud{
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  display:flex;
  justify-content:space-between;
  z-index:20;
}
.card{
  background:rgba(0,0,0,.65);
  padding:9px 14px;
  border-radius:14px;
  font-weight:bold;
  box-shadow:0 3px 10px #0005;
}

/* School */
#school{
  position:absolute;
  width:76%;
  height:220px;
  left:12%;
  top:16%;
  background:#f6c453;
  border:7px solid #8b4513;
  border-radius:12px;
  box-shadow:0 8px 0 #69340e;
}
#schoolName{
  text-align:center;
  background:#1d4ed8;
  padding:9px;
  font-weight:bold;
  font-size:18px;
}
.window{
  position:absolute;
  width:55px;
  height:55px;
  background:#8be0ff;
  border:5px solid white;
}
.w1{left:10%;top:70px}
.w2{right:10%;top:70px}
#door{
  position:absolute;
  width:65px;
  height:95px;
  background:#7c3f16;
  bottom:0;
  left:calc(50% - 32px);
  border:5px solid #542807;
}

/* Road */
#path{
  position:absolute;
  width:110px;
  height:48%;
  background:#d7c5a2;
  left:calc(50% - 55px);
  top:43%;
}

/* Areas */
.area{
  position:absolute;
  padding:10px;
  border-radius:12px;
  font-weight:bold;
  text-align:center;
  box-shadow:0 4px 10px #0004;
}
#library{
  left:3%;
  top:53%;
  background:#8b5cf6;
}
#playground{
  right:3%;
  top:53%;
  background:#f97316;
}
#canteen{
  right:3%;
  top:70%;
  background:#ef4444;
}

/* Player */
#player{
  position:absolute;
  width:48px;
  height:58px;
  left:calc(50% - 24px);
  top:72%;
  z-index:10;
  font-size:45px;
  text-align:center;
  filter:drop-shadow(0 4px 2px #0005);
}

/* Coins */
.coin{
  position:absolute;
  font-size:30px;
  z-index:5;
  animation:spin 1s infinite alternate;
}
@keyframes spin{
  from{transform:scale(.8)}
  to{transform:scale(1.15)}
}

/* Mission */
#mission{
  position:absolute;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  background:#fff;
  color:#111;
  padding:10px 16px;
  border-radius:15px;
  z-index:20;
  font-weight:bold;
  text-align:center;
  width:85%;
  max-width:400px;
}

/* Controls */
#controls{
  position:absolute;
  bottom:18px;
  left:18px;
  width:170px;
  height:150px;
  z-index:30;
}
.btn{
  position:absolute;
  width:58px;
  height:58px;
  border:none;
  border-radius:50%;
  background:rgba(15,23,42,.82);
  color:white;
  font-size:28px;
  box-shadow:0 4px 8px #0006;
}
#up{left:56px;top:0}
#down{left:56px;bottom:0}
#left{left:0;top:46px}
#right{right:0;top:46px}

#action{
  position:absolute;
  right:20px;
  bottom:35px;
  width:85px;
  height:85px;
  border-radius:50%;
  border:4px solid white;
  background:#16a34a;
  color:white;
  font-weight:bold;
  font-size:16px;
  z-index:30;
}

#message{
  position:absolute;
  left:50%;
  bottom:190px;
  transform:translateX(-50%);
  background:rgba(0,0,0,.85);
  padding:12px 18px;
  border-radius:14px;
  z-index:40;
  display:none;
  text-align:center;
}
</style>
</head>

<body>
<div id="game">

  <div id="hud">
    <div class="card">⭐ Score: <span id="score">0</span></div>
    <div class="card">🪙 <span id="coins">0</span></div>
  </div>

  <div id="mission">📚 Mission: School ke door tak jao!</div>

  <div id="school">
    <div id="schoolName">🏫 SCHOOL LIFE INDIA 🇮🇳</div>
    <div class="window w1"></div>
    <div class="window w2"></div>
    <div id="door"></div>
  </div>

  <div id="path"></div>

  <div id="library" class="area">📚<br>Library</div>
  <div id="playground" class="area">🏏<br>Playground</div>
  <div id="canteen" class="area">🍛<br>Canteen</div>

  <div class="coin" style="left:28%;top:64%">🪙</div>
  <div class="coin" style="left:67%;top:62%">🪙</div>
  <div class="coin" style="left:48%;top:55%">🪙</div>
  <div class="coin" style="left:76%;top:78%">🪙</div>

  <div id="player">🧑‍🎓</div>

  <div id="message"></div>

  <div id="controls">
    <button class="btn" id="up">▲</button>
    <button class="btn" id="down">▼</button>
    <button class="btn" id="left">◀</button>
    <button class="btn" id="right">▶</button>
  </div>

  <button id="action">ACTION</button>

</div>

<script>
const player = document.getElementById("player");
const game = document.getElementById("game");
const scoreText = document.getElementById("score");
const coinsText = document.getElementById("coins");
const mission = document.getElementById("mission");
const message = document.getElementById("message");

let x = window.innerWidth / 2 - 24;
let y = window.innerHeight * 0.72;
let score = 0;
let coins = 0;
let missionDone = false;
let moveTimer;

function move(dx,dy){
  x += dx;
  y += dy;

  x = Math.max(0,Math.min(window.innerWidth-48,x));
  y = Math.max(90,Math.min(window.innerHeight-65,y));

  player.style.left = x+"px";
  player.style.top = y+"px";

  checkCoins();
  checkMission();
}

function startMove(dx,dy){
  move(dx,dy);
  clearInterval(moveTimer);
  moveTimer=setInterval(()=>move(dx,dy),70);
}

function stopMove(){
  clearInterval(moveTimer);
}

function bindButton(id,dx,dy){
  const b=document.getElementById(id);

  b.addEventListener("touchstart",e=>{
    e.preventDefault();
    startMove(dx,dy);
  });

  b.addEventListener("touchend",stopMove);
  b.addEventListener("mousedown",()=>startMove(dx,dy));
  b.addEventListener("mouseup",stopMove);
}

bindButton("up",0,-12);
bindButton("down",0,12);
bindButton("left",-12,0);
bindButton("right",12,0);

function checkCoins(){
  document.querySelectorAll(".coin").forEach(c=>{
    const a=player.getBoundingClientRect();
    const b=c.getBoundingClientRect();

    if(
      a.left<b.right &&
      a.right>b.left &&
      a.top<b.bottom &&
      a.bottom>b.top
    ){
      c.remove();
      coins++;
      score+=10;
      coinsText.textContent=coins;
      scoreText.textContent=score;
      showMessage("🪙 Coin collected! +10 Score");
    }
  });
}

function checkMission(){
  const door=document.getElementById("door").getBoundingClientRect();
  const p=player.getBoundingClientRect();

  if(!missionDone &&
     p.left<door.right &&
     p.right>door.left &&
     p.top<door.bottom &&
     p.bottom>door.top){
       missionDone=true;
       score+=100;
       scoreText.textContent=score;
       mission.textContent="✅ Mission Complete! Ab school explore karo.";
       showMessage("🎉 School pahunch gaye! +100 Score");
  }
}

function showMessage(text){
  message.textContent=text;
  message.style.display="block";
  setTimeout(()=>{
    message.style.display="none";
  },1800);
}

document.getElementById("action").addEventListener("click",()=>{
  showMessage("🎒 School Life India — More missions coming soon!");
});

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp") move(0,-12);
  if(e.key==="ArrowDown") move(0,12);
  if(e.key==="ArrowLeft") move(-12,0);
  if(e.key==="ArrowRight") move(12,0);
});

player.style.left=x+"px";
player.style.top=y+"px";
</script>

</body>
  </html>
